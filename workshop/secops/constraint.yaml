apiVersion: constraints.gatekeeper.sh/v1beta1
kind: FalcoRootPrevention
metadata:
  name: enforce-falco-root-prevention
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
    namespaces: ["production", "staging", "engineering-platform"]
#    namespaces: ["default", "production", "staging", "engineering-platform"]
  parameters:
    exemptNamespaces:
      - "kube-system"
      - "kube-public"
      - "gatekeeper-system"
    exemptImages:
      - "registry.k8s.io/"    # Kubernetes system images (e.g., kube-proxy, coredns)
      - "gcr.io/distroless/"  # Google distroless base images (minimal, no shell)
    exemptUsers:
      - "1000"   # Common non-root user UID used in workshop deployments (e.g., deployment-works.yaml)
      - "65534"  # 'nobody' user — standard unprivileged UID used by many minimal container images
