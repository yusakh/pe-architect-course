apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: falco-alerts
  namespace: falco-system
  labels:
    release: grafana-stack  # must match Prometheus ruleSelector
spec:
  groups:
  - name: falco.rules
    rules:
    - alert: FalcoCriticalEvent
      expr: increase(falcosecurity_falcosidekick_falco_events_total{priority_raw=~"emergency|alert|critical|error"}[5m]) > 0
      for: 0m
      labels:
        severity: critical
        source: falco
      annotations:
        summary: "Falco Critical: {{ $labels.rule }}"
        description: "Rule '{{ $labels.rule }}' fired at {{ $labels.priority_raw }} level on {{ $labels.hostname }}"

    - alert: FalcoWarningEvent
      expr: increase(falcosecurity_falcosidekick_falco_events_total{priority_raw="warning"}[5m]) > 0
      for: 0m
      labels:
        severity: warning
        source: falco
      annotations:
        summary: "Falco Warning: {{ $labels.rule }}"
        description: "Rule '{{ $labels.rule }}' fired at {{ $labels.priority_raw }} level on {{ $labels.hostname }}"
