apiVersion: v1
kind: ServiceAccount
metadata:
  name: teams-api
  namespace: teams-api
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: teams-api-rollout-reader
rules:
- apiGroups: ["rollouts.platform.io"]
  resources: ["rollouttemplates"]
  verbs: ["get", "list"]
- apiGroups: ["rollouts.platform.io"]
  resources: ["rolloutrequests"]
  verbs: ["get", "list", "create", "delete"]
- apiGroups: ["argoproj.io"]
  resources: ["rollouts"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: teams-api-rollout-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: teams-api-rollout-reader
subjects:
- kind: ServiceAccount
  name: teams-api
  namespace: teams-api
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teams-api-data
  namespace: teams-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-api
  namespace: teams-api
  labels:
    app: teams-api
  annotations:
    commit-sha: 8b514a1cb354
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teams-api
  template:
    metadata:
      labels:
        app: teams-api
    spec:
      serviceAccountName: teams-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: teams-api
#        image: olivercodes01/teams-api:0.0.2
        image: teams-api:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        # - name: HOST
        #   value: "0.0.0.0"
        # - name: LOG_LEVEL
        #   value: "info"
        # - name: CORS_ORIGINS
        #   value: "*"
        - name: OTEL_SERVICE_NAME
          value: "teams-api"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger.jaeger-system.svc.cluster.local:4318"
        # API_TOKEN intentionally unset — disables static-token auth (Keycloak handles UI auth)
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: teams-data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: teams-data
        persistentVolumeClaim:
          claimName: teams-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: teams-api-service
  namespace: teams-api
  labels:
    app: teams-api
spec:
  selector:
    app: teams-api
  ports:
    - name: http
      protocol: TCP
      port: 4200
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teams-api-ingress
  namespace: teams-api
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET,POST,PUT,DELETE,OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type,Authorization,X-Requested-With"
spec:
  rules:
  - host: teams-api.127.0.0.1.sslip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: teams-api-service
            port:
              number: 4200
