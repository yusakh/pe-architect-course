# k8s/teams-api-deployment.yaml
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: teams-api-data
  namespace: engineering-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-api
  namespace: engineering-platform
  labels:
    app: teams-api
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teams-api
  template:
    metadata:
      labels:
        app: teams-api
        component: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: teams-api
        image: teams-api:local
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        - name: OTEL_SERVICE_NAME
          value: "teams-api"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://jaeger.jaeger-system.svc.cluster.local:4318"
        - name: API_TOKEN
          valueFrom:
            secretKeyRef:
              name: teams-api-secret
              key: api-token
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        volumeMounts:
        - name: teams-data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: teams-data
        persistentVolumeClaim:
          claimName: teams-api-data
