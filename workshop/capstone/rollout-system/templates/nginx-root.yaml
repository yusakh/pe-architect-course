apiVersion: rollouts.platform.io/v1alpha1
kind: RolloutTemplate
metadata:
  name: nginx-root
  namespace: rollout-system
spec:
  image: nginx:alpine
  port: 80
  replicas: 2
  strategy:
    type: Canary
    canary:
      steps:
      - setWeight: 50
      - pause:
          duration: 30
      - setWeight: 100
  resources:
    requests:
      memory: 32Mi
      cpu: 25m
    limits:
      memory: 64Mi
      cpu: 50m
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
