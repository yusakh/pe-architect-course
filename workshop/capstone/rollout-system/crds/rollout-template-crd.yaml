apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rollouttemplates.rollouts.platform.io
spec:
  group: rollouts.platform.io
  scope: Namespaced
  names:
    plural: rollouttemplates
    singular: rollouttemplate
    kind: RolloutTemplate
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [image, port]
            properties:
              image:
                type: string
              port:
                type: integer
              replicas:
                type: integer
                default: 2
              strategy:
                type: object
                properties:
                  type:
                    type: string
                    enum: [Canary, BlueGreen]
                    default: Canary
                  canary:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
              resources:
                type: object
                x-kubernetes-preserve-unknown-fields: true
              securityContext:
                type: object
                properties:
                  runAsUser:
                    type: integer
                  runAsGroup:
                    type: integer
                  runAsNonRoot:
                    type: boolean
