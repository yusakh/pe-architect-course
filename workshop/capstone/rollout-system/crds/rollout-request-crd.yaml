apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: rolloutrequests.rollouts.platform.io
spec:
  group: rollouts.platform.io
  scope: Namespaced
  names:
    plural: rolloutrequests
    singular: rolloutrequest
    kind: RolloutRequest
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required: [templateRef]
            properties:
              templateRef:
                type: string
              replicas:
                type: integer
          status:
            type: object
            properties:
              phase:
                type: string
                enum: [Pending, Creating, Running, Failed]
              message:
                type: string
              rolloutName:
                type: string
